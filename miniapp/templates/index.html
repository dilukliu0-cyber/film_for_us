<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мое портфолио фильмов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 12px 16px;
            border-radius: 12px;
            flex: 1;
            min-width: 100px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #3390ec);
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }

        .movie-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .movie-card:active {
            transform: scale(0.95);
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #ddd;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .movie-rating {
            font-size: 16px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #3390ec);
        }

        .movie-year {
            font-size: 12px;
            opacity: 0.6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            opacity: 0.6;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-text {
            font-size: 18px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 Мое портфолио</h1>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="stat-value" id="total">0</div>
            <div class="stat-label">Всего</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgRating">0</div>
            <div class="stat-label">Средняя оценка</div>
        </div>
    </div>

    <div id="content">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Получаем user_id из URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');

        async function loadMovies() {
            try {
                // Загружаем фильмы
                const moviesResponse = await fetch(`/api/user/${userId}/movies`);
                const moviesData = await moviesResponse.json();

                // Загружаем статистику
                const statsResponse = await fetch(`/api/user/${userId}/stats`);
                const statsData = await statsResponse.json();

                // Обновляем статистику
                document.getElementById('total').textContent = statsData.total;
                document.getElementById('avgRating').textContent = statsData.average_rating;

                // Отображаем фильмы
                const content = document.getElementById('content');

                if (moviesData.movies.length === 0) {
                    content.innerHTML = `
                        <div class="empty">
                            <div class="empty-icon">🎬</div>
                            <div class="empty-text">Пока нет фильмов<br>Добавь первый через бота!</div>
                        </div>
                    `;
                    return;
                }

                const moviesHTML = moviesData.movies.map(movie => `
                    <div class="movie-card" onclick="showMovie(${movie.id})">
                        <img class="movie-poster"
                             src="${movie.poster_url || '/static/no-poster.png'}"
                             alt="${movie.title}"
                             onerror="this.src='/static/no-poster.png'">
                        <div class="movie-info">
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-rating">⭐ ${movie.rating}/10</div>
                            ${movie.year ? `<div class="movie-year">${movie.year}</div>` : ''}
                        </div>
                    </div>
                `).join('');

                content.innerHTML = `<div class="movies-grid">${moviesHTML}</div>`;

            } catch (error) {
                console.error('Error loading movies:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty">
                        <div class="empty-text">Ошибка загрузки 😔</div>
                    </div>
                `;
            }
        }

        function showMovie(movieId) {
            tg.showAlert(`Фильм ID: ${movieId}`);
            // Здесь можно добавить модальное окно с деталями
        }

        // Загружаем данные при открытии
        loadMovies();
    </script>
</body>
</html>
